<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - 仙人Tube+</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #007bff;
            --bg-light: #fdfdfd;
            --text-dark: #333333;
            --gray-logo: #555555;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --card-bg: #ffffff;
            --border-color: #e5e5e5;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-light: #121212;
                --text-dark: #e0e0e0;
                --glass-bg: rgba(30, 30, 30, 0.85);
                --gray-logo: #bbbbbb;
                --card-bg: #252525;
                --border-color: #333;
            }
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding-top: 80px;
        }

        #top-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            background-color: var(--glass-bg);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 1000; padding: 12px 25px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        .logo-small h2 {
            font-size: 1.5rem; color: var(--gray-logo); margin: 0; cursor: pointer;
        }

        .logo-small sup { color: var(--primary-color); font-size: 0.6em; }

        .search-container {
            position: relative; flex: 0 1 600px; margin: 0 20px;
        }

        .search-container input {
            width: 100%; padding: 12px 20px 12px 45px;
            border: 1px solid var(--border-color); border-radius: 50px;
            background: var(--card-bg); color: var(--text-dark);
            outline: none; transition: all 0.3s; box-sizing: border-box;
        }

        .search-container i {
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
            color: #aaa;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }

        /* プレイリスト情報サイドバー */
        .playlist-info {
            position: sticky;
            top: 100px;
            background: linear-gradient(180deg, var(--card-bg) 0%, var(--bg-light) 100%);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            height: fit-content;
        }

        .playlist-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .playlist-title { font-size: 1.5rem; margin: 0 0 10px; font-weight: 700; }
        .author-link { color: var(--primary-color); text-decoration: none; font-weight: bold; }
        .meta-text { font-size: 0.9rem; color: #888; margin-top: 5px; }

        /* 動画リスト */
        .video-list { display: flex; flex-direction: column; gap: 12px; }

        .video-item {
            display: flex;
            gap: 15px;
            padding: 10px;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            transition: background 0.2s;
        }

        .video-item:hover { background: rgba(128, 128, 128, 0.1); }

        .v-thumb-box {
            position: relative;
            width: 160px;
            flex-shrink: 0;
        }

        .v-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 8px;
            object-fit: cover;
        }

        .v-index {
            position: absolute;
            left: -25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8rem;
            color: #888;
        }

        .v-info { display: flex; flex-direction: column; justify-content: center; }
        .v-title {
            font-weight: bold;
            font-size: 0.95rem;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .v-meta { font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>
    <header id="top-bar">
        <div class="logo-small" onclick="location.href='/'"><h2>仙人Tube<sup>+</sup></h2></div>
        <form action="/search" method="get" class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" name="q" placeholder="検索..." autocomplete="off">
        </form>
        <div style="width: 40px;"></div>
    </header>

    <main class="container">
        <section class="playlist-info">
            <img class="playlist-thumb" src="/proxy/thumb?v={{ videos[0].videoId if videos else '' }}" alt="thumbnail">
            <h1 class="playlist-title">{{ title }}</h1>
            <a href="/channel/{{ authorId }}" class="author-link">{{ author }}</a>
            <div class="meta-text">{{ videos|length }} 本の動画</div>
            <div style="margin-top: 15px; font-size: 0.85rem; opacity: 0.8;">{{ description|safe }}</div>
        </section>

        <section class="video-list">
            {% for video in videos %}
            <a href="/watch?v={{ video.videoId }}&list={{ playlistId }}" class="video-item">
                <div class="v-thumb-box">
                    <span class="v-index">{{ loop.index }}</span>
                    <img class="v-thumb" src="/proxy/thumb?v={{ video.videoId }}" alt="thumb">
                </div>
                <div class="v-info">
                    <div class="v-title">{{ video.title }}</div>
                    <div class="v-meta">{{ video.author }}</div>
                </div>
            </a>
            {% endfor %}
        </section>
    </main>
</body>
</html>
