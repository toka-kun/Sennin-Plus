<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>「{{ word }}」の検索結果</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="logo"><a href="/"><h2>仙人Tube+</h2></a></div>
        <form action="/search" class="search-bar">
            <input type="text" name="q" value="{{ word }}">
            <button type="submit">🔍</button>
        </form>
    </header>

    <main class="container">
        <div class="video-grid">
            {% for item in results %}
            {% if item.type == 'video' %}
            <div class="video-card">
                <a href="/watch?v={{ item.videoId }}">
                    <div class="thumbnail-container">
                        <img src="/thumbnail?v={{ item.videoId }}" class="thumbnail" loading="lazy">
                    </div>
                    <div class="video-info">
                        <img src="/thumbnail?v={{ item.videoId }}" class="author-icon-mini"> <div class="title-area">
                            <div class="video-title">{{ item.title }}</div>
                            <div class="video-meta">{{ item.author }}</div>
                            <div class="video-meta">{{ item.viewCountText }} • {{ item.publishedText }}</div>
                        </div>
                    </div>
                </a>
            </div>
            {% endif %}
            {% endfor %}
        </div>
    </main>
</body>
</html>
