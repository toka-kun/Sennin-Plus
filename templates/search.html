<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>「{{ word }}」の検索結果 - 仙人Tube+</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- 共通スタイル (トップページの雰囲気を完全継承) --- */
        :root {
            --primary-color: #007bff;
            --bg-light: #fdfdfd;
            --text-dark: #333333;
            --gray-logo: #555555;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --card-bg: #ffffff;
            --border-color: #e5e5e5;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-light: #121212;
                --text-dark: #e0e0e0;
                --glass-bg: rgba(30, 30, 30, 0.85);
                --card-bg: #252525;
                --border-color: #333;
            }
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding-top: 80px;
        }

        /* --- グラスモーフィズム・ヘッダー --- */
        #top-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            background-color: var(--glass-bg);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 1000; padding: 12px 25px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        .logo-small h2 {
            font-size: 1.5rem; color: var(--gray-logo); margin: 0; cursor: pointer;
            font-weight: 700; letter-spacing: -1px;
        }

        .logo-small sup { color: var(--primary-color); font-size: 0.6em; }

        .search-container {
            position: relative; flex: 0 1 600px; margin: 0 20px;
        }

        .search-container input {
            width: 100%; padding: 12px 20px 12px 45px;
            border: 2px solid transparent; border-radius: 50px;
            background: var(--card-bg); color: var(--text-dark);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            outline: none; transition: all 0.3s; box-sizing: border-box;
        }

        .search-container input:focus { border-color: var(--primary-color); box-shadow: 0 4px 20px rgba(0,123,255,0.15); }

        .search-container i {
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
            color: #aaa;
        }

        /* --- 検索結果カードグリッド --- */
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .video-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px;
        }

        .video-card {
            background: var(--card-bg); border-radius: 15px; overflow: hidden;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-decoration: none; color: inherit;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; flex-direction: column;
        }

        .video-card:hover { transform: translateY(-6px); box-shadow: 0 12px 30px rgba(0,0,0,0.12); }

        .thumbnail-box { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; }
        .thumbnail { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .video-card:hover .thumbnail { transform: scale(1.05); }

        .video-info { padding: 15px; display: flex; gap: 12px; }
        .author-icon { width: 36px; height: 36px; border-radius: 50%; background: #eee; flex-shrink: 0; }

        .video-title { 
            font-weight: 700; font-size: 0.95rem; line-height: 1.4; margin-bottom: 6px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; 
        }

        .video-meta { font-size: 0.8rem; color: #888; }

        @media (max-width: 600px) { .video-grid { grid-template-columns: 1fr; } .logo-small h2 { font-size: 1.2rem; } }
    </style>
</head>
<body>
    <header id="top-bar">
        <div class="logo-small" onclick="location.href='/'"><h2>仙人Tube<sup>+</sup></h2></div>
        <form action="/search" method="get" class="search-container">
            <i class="fas fa-search"></i>
            <input type="search" name="q" value="{{ word }}" placeholder="動画を検索..." autocomplete="off">
        </form>
        <div style="width: 40px;"></div>
    </header>

    <main class="container">
        <div class="video-grid">
            {% for item in results %}
                {% if item.type == 'video' %}
                <a href="/watch?v={{ item.videoId }}" class="video-card">
                    <div class="thumbnail-box">
                        <img src="/thumbnail?v={{ item.videoId }}" class="thumbnail" loading="lazy">
                    </div>
                    <div class="video-info">
                        <div class="author-icon" style="background-image: url('/thumbnail?v={{ item.videoId }}'); background-size: cover;"></div>
                        <div>
                            <div class="video-title">{{ item.title }}</div>
                            <div class="video-meta">
                                <strong>{{ item.author }}</strong><br>
                                {{ item.viewCountText }} • {{ item.publishedText }}
                            </div>
                        </div>
                    </div>
                </a>
                {% endif %}
            {% endfor %}
        </div>
    </main>
</body>
</html>
