<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>「{{ word }}」の検索結果 - 仙人Tube+</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .container { max-width: 1400px; margin: 80px auto 0; padding: 20px; }
        .video-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px;
        }
        .video-card {
            background: var(--card-bg); border-radius: 15px; overflow: hidden;
            transition: all 0.3s ease; text-decoration: none; color: inherit;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .video-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .thumbnail { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .video-info { padding: 15px; display: flex; gap: 12px; }
        .author-img { width: 36px; height: 36px; border-radius: 50%; background: #eee; }
        .video-title { font-weight: 700; font-size: 1rem; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-meta { font-size: 0.85rem; color: #888; }
    </style>
</head>
<body>
    <header id="top-bar">
        <div class="logo-small" onclick="location.href='/'"><h2>仙人Tube<sup>+</sup></h2></div>
        <form action="/search" class="search-container">
            <i class="fas fa-search"></i>
            <input type="search" name="q" value="{{ word }}" placeholder="検索...">
        </form>
        <div style="width: 40px;"></div>
    </header>

    <main class="container">
        <div class="video-grid">
            {% for item in results %}
            {% if item.type == 'video' %}
            <a href="/watch?v={{ item.videoId }}" class="video-card">
                <img src="/thumbnail?v={{ item.videoId }}" class="thumbnail">
                <div class="video-info">
                    <div class="author-img" style="background-image: url('/thumbnail?v={{ item.videoId }}'); background-size: cover;"></div>
                    <div>
                        <div class="video-title">{{ item.title }}</div>
                        <div class="video-meta">{{ item.author }}<br>{{ item.viewCountText }}</div>
                    </div>
                </div>
            </a>
            {% endif %}
            {% endfor %}
        </div>
    </main>
</body>
</html>
