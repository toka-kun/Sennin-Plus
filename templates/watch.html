<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ video_title }} - 仙人Tube+</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- 共通スタイル継承 --- */
        :root {
            --primary-color: #007bff;
            --bg-light: #fdfdfd;
            --text-dark: #333333;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --card-bg: #ffffff;
            --border-color: #e5e5e5;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-light: #121212;
                --text-dark: #e0e0e0;
                --glass-bg: rgba(30, 30, 30, 0.85);
                --card-bg: #252525;
            }
        }

        body { font-family: 'Noto Sans JP', sans-serif; margin: 0; background-color: var(--bg-light); color: var(--text-dark); padding-top: 70px; }

        #top-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            background-color: var(--glass-bg); backdrop-filter: blur(10px);
            z-index: 1000; padding: 12px 25px; display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05); box-sizing: border-box;
        }

        .logo-small h2 { font-size: 1.4rem; color: var(--gray-logo); margin: 0; cursor: pointer; font-weight: 700; }
        .logo-small sup { color: var(--primary-color); }

        /* --- 再生画面レイアウト --- */
        .watch-container {
            display: grid; grid-template-columns: 1fr 400px; gap: 30px;
            max-width: 1700px; margin: 20px auto; padding: 0 30px;
        }

        .video-section { width: 100%; }
        
        #player-wrapper {
            width: 100%; aspect-ratio: 16/9; background: #000;
            border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }
        video { width: 100%; height: 100%; outline: none; }

        .video-details {
            background: var(--card-bg); border-radius: 20px; padding: 25px; margin-top: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .video-title-watch { font-size: 1.3rem; font-weight: 700; margin: 0 0 15px; line-height: 1.4; }

        .quality-selector { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .quality-btn {
            background: rgba(0, 123, 255, 0.1); color: var(--primary-color);
            border: none; padding: 8px 18px; border-radius: 50px; cursor: pointer;
            font-weight: 700; font-size: 0.85rem; transition: all 0.2s;
        }
        .quality-btn:hover { background: var(--primary-color); color: #fff; transform: translateY(-2px); }

        .channel-info { display: flex; align-items: center; gap: 15px; margin-top: 20px; }
        .channel-info img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        .channel-name { font-weight: 700; font-size: 1.1rem; }
        .sub-count { font-size: 0.8rem; color: #888; }

        .description-box {
            margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color);
            font-size: 0.95rem; line-height: 1.8; color: var(--text-dark);
        }

        /* --- 関連動画サイドバー --- */
        .recommend-section { display: flex; flex-direction: column; gap: 15px; }
        .recommend-card {
            display: flex; gap: 12px; text-decoration: none; color: inherit;
            transition: transform 0.2s;
        }
        .recommend-card:hover { transform: translateX(5px); }
        .recommend-thumb { width: 160px; aspect-ratio: 16/9; border-radius: 12px; object-fit: cover; flex-shrink: 0; }
        .recommend-title { font-size: 0.9rem; font-weight: 700; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .recommend-meta { font-size: 0.75rem; color: #888; margin-top: 5px; }

        @media (max-width: 1100px) {
            .watch-container { grid-template-columns: 1fr; padding: 0 15px; }
            .recommend-section { margin-top: 30px; }
        }
    </style>
</head>
<body>
    <header id="top-bar">
        <div class="logo-small" onclick="location.href='/'"><h2>仙人Tube<sup>+</sup></h2></div>
        <form action="/search" method="get" class="search-container">
            <i class="fas fa-search"></i>
            <input type="search" name="q" placeholder="動画を検索...">
        </form>
        <div style="width: 40px;"></div>
    </header>

    <main class="watch-container">
        <div class="video-section">
            <div id="player-wrapper">
                <video id="video-player" controls autoplay poster="/thumbnail?v={{ videoid }}">
                    <source src="{{ videourls[0] }}" type="video/mp4">
                    ブラウザが動画再生に対応していません。
                </video>
            </div>

            <div class="video-details">
                <h1 class="video-title-watch">{{ video_title }}</h1>
                
                <div class="quality-selector">
                    <span style="font-size: 0.8rem; color: #888; width: 100%; margin-bottom: 5px;">画質を選択:</span>
                    {% for stream in streamUrls %}
                    <button class="quality-btn" onclick="changeQuality('{{ stream.url }}')">
                        <i class="fas fa-hd"></i> {{ stream.resolution }}
                    </button>
                    {% endfor %}
                    <button class="quality-btn" onclick="changeQuality('{{ videourls[0] }}')">Default</button>
                </div>

                <div class="channel-info">
                    <img src="{{ author_icon }}" alt="icon">
                    <div>
                        <div class="channel-name">{{ author }}</div>
                        <div class="sub-count">登録者数 {{ subscribers_count }} • {{ view_count }} 回視聴</div>
                    </div>
                </div>

                <div class="description-box">
                    {{ description | safe }}
                </div>
            </div>
        </div>

        <div class="recommend-section">
            <h3 style="margin: 0 0 10px; font-size: 1.1rem;">関連動画</h3>
            {% for v in recommended_videos %}
            <a href="/watch?v={{ v.video_id }}" class="recommend-card">
                <img src="/thumbnail?v={{ v.video_id }}" class="recommend-thumb" loading="lazy">
                <div>
                    <div class="recommend-title">{{ v.title }}</div>
                    <div class="recommend-meta">{{ v.author }}<br>{{ v.view_count_text }}</div>
                </div>
            </a>
            {% endfor %}
        </div>
    </main>

    <script>
        function changeQuality(url) {
            const video = document.getElementById('video-player');
            const currentTime = video.currentTime;
            const isPaused = video.paused;
            video.src = url;
            video.currentTime = currentTime;
            if (!isPaused) video.play();
        }
    </script>
</body>
</html>
