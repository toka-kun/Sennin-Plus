{% extends "index.html" %}
{% block content %}
<style>
    #contents { justify-content: flex-start; padding-top: 100px; }
    .player-container { width: 100%; max-width: 1000px; margin-bottom: 20px; }
    .video-info { background: var(--glass-bg); padding: 20px; border-radius: 15px; text-align: left; }
</style>

<div id="contents">
    <div class="player-container">
        <div style="position:relative; padding-top:56.25%; border-radius:15px; overflow:hidden; box-shadow:0 20px 50px rgba(0,0,0,0.2);">
            <iframe src="{{ instance }}/embed/{{ v }}?autoplay=1" 
                    style="position:absolute; top:0; left:0; width:100%; height:100%; border:none;" 
                    allowfullscreen></iframe>
        </div>
        <div class="video-info mt-3">
            <h3>{{ video.title }}</h3>
            <div class="d-flex align-items-center gap-3">
                <img src="{{ video.authorThumbnails[-1].url }}" style="width:40px; border-radius:50%;">
                <strong>{{ video.author }}</strong>
            </div>
            <hr>
            <div style="font-size:0.9em; color:#666;">
                {{ video.descriptionHtml | safe }}
            </div>
        </div>
    </div>
</div>
{% endblock %}
