<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games - 仙人Tube</title>
    <link rel="icon" href="/img/logo/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #007bff, #00c6ff);
            --bg-light: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --accent-color: #007bff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-light: #0f172a;
                --card-bg: #1e293b;
                --text-main: #f1f5f9;
                --text-sub: #94a3b8;
                --accent-color: #38bdf8;
            }
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 装飾的な背景のボケ */
        body::before {
            content: "";
            position: fixed;
            top: -10%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 123, 255, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        #top-bar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            padding: 15px 5%;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
            box-sizing: border-box;
        }

        #top-bar a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 700;
            font-size: 0.95rem;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #top-bar a:hover {
            opacity: 0.7;
        }

        #contents {
            padding: 120px 20px 60px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .header-group {
            text-align: center;
            margin-bottom: 50px;
        }

        h2 {
            font-family: 'Poppins', 'Noto Sans JP', sans-serif;
            font-size: 2.5rem;
            margin: 0;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }

        .subtitle {
            color: var(--text-sub);
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 123, 255, 0.15);
            border-color: var(--accent-color);
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: var(--bg-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .game-card:hover .icon-wrapper {
            transform: scale(1.1) rotate(5deg);
        }

        .game-card i {
            font-size: 2.5rem;
            color: var(--accent-color);
        }

        .game-card span {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .game-card .category {
            font-size: 0.75rem;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* バッジ表示（新着ゲーム用など） */
        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff4757;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .game-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            .game-card {
                padding: 20px 10px;
            }
            .icon-wrapper {
                width: 60px;
                height: 60px;
            }
            .game-card i {
                font-size: 1.8rem;
            }
            h2 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <header id="top-bar">
        <a href="/"><i class="fas fa-arrow-left"></i> 仙人Tubeに戻る</a>
    </header>

    <div id="contents">
        <div class="header-group">
            <h2><i class="fas fa-rocket"></i> Arcade Space</h2>
            <p class="subtitle">お気に入りのゲームを選んで遊ぼう</p>
        </div>

        <div class="game-grid">
            <a href="/block.html" class="game-card">
                <div class="icon-wrapper">
                    <i class="fas fa-cubes"></i>
                </div>
                <span>ブロックブラスト</span>
                <div class="category">Puzzle</div>
            </a>

            <a href="/tumu.html" class="game-card">
                <span class="badge">HOT</span>
                <div class="icon-wrapper">
                    <i class="fas fa-circle"></i>
                </div>
                <span>ツムツム</span>
                <div class="category">Action</div>
            </a>

            <a href="/2048.html" class="game-card">
                <div class="icon-wrapper">
                    <i class="fas fa-th-large"></i>
                </div>
                <span>2048</span>
                <div class="category">Logic</div>
            </a>       
        </div>
    </div>
</body>

</html>
