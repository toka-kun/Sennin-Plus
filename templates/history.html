<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>再生履歴 - 仙人Tube+</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #007bff;
            --bg-light: #fdfdfd;
            --text-dark: #333333;
            --card-bg: #ffffff;
            --border-color: #e5e5e5;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-light: #121212;
                --text-dark: #e0e0e0;
                --glass-bg: rgba(30, 30, 30, 0.85);
                --card-bg: #252525;
                --border-color: #333;
            }
        }

        body { font-family: 'Noto Sans JP', sans-serif; margin: 0; background-color: var(--bg-light); color: var(--text-dark); padding-top: 80px; }
        
        #top-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
            z-index: 1000; padding: 12px 25px; display: flex; align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05); box-sizing: border-box;
        }
        @media (prefers-color-scheme: dark) { #top-bar { background: rgba(30,30,30,0.85); } }

        /* ロゴの「+」を青くする設定 */
        .logo-small sup { color: var(--primary-color); font-size: 0.6em; }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .history-list { display: flex; flex-direction: column; gap: 15px; }
        .history-item {
            display: flex; gap: 20px; background: var(--card-bg); padding: 15px;
            border-radius: 15px; border: 1px solid var(--border-color);
            text-decoration: none; color: inherit; transition: transform 0.2s;
        }
        .history-item:hover { transform: scale(1.01); border-color: var(--primary-color); }
        .thumb { width: 200px; aspect-ratio: 16/9; border-radius: 10px; object-fit: cover; }
        
        .info { flex: 1; }
        .title { font-size: 1.1rem; font-weight: 700; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .meta { font-size: 0.85rem; color: #888; }
        
        .clear-btn {
            background: #ff4d4f; color: white; border: none; padding: 10px 20px;
            border-radius: 50px; cursor: pointer; text-decoration: none; font-weight: 700; font-size: 0.9rem;
        }
        .empty-msg { text-align: center; margin-top: 100px; color: #888; }
    </style>
</head>
<body>
    <header id="top-bar">
        <div class="logo-small" onclick="location.href='/'" style="cursor:pointer; font-weight:700; font-size:1.5rem;">
            仙人Tube<sup>+</sup>
        </div>
    </header>

    <main class="container">
        <div class="header-flex">
            <h1><i class="fas fa-history" style="margin-right:10px; color:var(--primary-color);"></i>再生履歴</h1>
            {% if history %}
            <a href="/history/clear" class="clear-btn" onclick="return confirm('履歴をすべて削除しますか？')">すべて削除</a>
            {% endif %}
        </div>

        <div class="history-list">
            {% for item in history %}
            <a href="/watch?v={{ item.videoId }}" class="history-item">
                <img src="/thumbnail?v={{ item.videoId }}" class="thumb">
                <div class="info">
                    <div class="title">{{ item.title }}</div>
                    <div class="meta">
                        <div><i class="fas fa-user"></i> {{ item.author }}</div>
                        <div><i class="fas fa-clock"></i> {{ item.added_at }}</div>
                    </div>
                </div>
            </a>
            {% endfor %}

            {% if not history %}
            <div class="empty-msg">
                <i class="fas fa-ghost fa-3x" style="margin-bottom:20px;"></i>
                <p>履歴はありません</p>
                <a href="/" style="color:var(--primary-color);">動画を探しに行く</a>
            </div>
            {% endif %}
        </div>
    </main>
</body>
</html>
