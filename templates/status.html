<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instance Status - Invidious Web</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: #ff0000;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            background-color: #2c2c2c;
            color: #aaaaaa;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        tr:hover {
            background-color: #252525;
        }
        .status-online {
            color: #4caf50;
            font-weight: bold;
        }
        .status-offline {
            color: #f44336;
            font-weight: bold;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #3ea6ff;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Invidious API Status</h1>
        <p>現在の各インスタンスの稼働状況を確認します。</p>
        
        <table>
            <thead>
                <tr>
                    <th>Instance URL</th>
                    <th>Status</th>
                    <th>Latency</th>
                    <th>Version</th>
                    <th>Users</th>
                </tr>
            </thead>
            <tbody>
                {% for item in instances %}
                <tr>
                    <td>{{ item.instance }}</td>
                    <td>
                        <span class="{{ 'status-online' if item.status == 'Online' else 'status-offline' }}">
                            {{ item.status }}
                        </span>
                    </td>
                    <td>{{ item.latency }}</td>
                    <td>{{ item.version }}</td>
                    <td>{{ item.users }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="/" class="back-link">← ホームに戻る</a>
    </div>
</body>
</html>
