<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Timeout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #007bff;
            --bg-light: #fdfdfd;
            --text-dark: #333333;
            --gray-logo: #555555;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --card-bg: #ffffff;
            --border-color: #e5e5e5;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-light: #121212;
                --text-dark: #e0e0e0;
                --glass-bg: rgba(30, 30, 30, 0.85);
                --gray-logo: #bbbbbb;
                --card-bg: #252525;
                --border-color: #333;
            }
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #top-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            background-color: var(--glass-bg);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 1000; padding: 12px 25px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        .logo-small h2 {
            font-size: 1.5rem; color: var(--gray-logo); margin: 0; cursor: pointer;
        }
        .logo-small sup { color: var(--primary-color); font-size: 0.6em; }

        .error-container {
            max-width: 500px;
            width: 90%;
            text-align: center;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .timeout-icon {
            font-size: 4rem;
            color: #ffa940;
            margin-bottom: 20px;
        }

        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        p { color: var(--gray-logo); margin-bottom: 30px; line-height: 1.6; }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-retry {
            background: var(--primary-color);
            color: white;
        }

        .btn-home {
            background: var(--border-color);
            color: var(--text-dark);
        }

        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <header id="top-bar">
        <div class="logo-small" onclick="location.href='/'">
            <h2>仙人tube<sup>＋</sup></h2>
        </div>
    </header>

    <div class="error-container">
        <div class="timeout-icon"><i class="fas fa-history"></i></div>
        <h1>タイムアウトが発生しました</h1>
        <p>サーバーからの応答に時間がかかりすぎたため、リクエストを中断しました。ネットワーク環境を確認するか、もう一度お試しください。</p>
        
        <div class="btn-group">
            <button onclick="location.reload()" class="btn btn-retry">再試行する</button>
            <a href="/" class="btn btn-home">ホームへ</a>
        </div>
    </div>
</body>
</html>
